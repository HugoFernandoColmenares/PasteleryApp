<div class="login-wrapper">
  <div class="login-decor left">
    <img ngSrc="login_1.png" width="250" height="250" alt="" />
  </div>

  <div class="login-card">
    <ng-container [ngSwitch]="mode()">
      <!-- LOGIN -->
      <div *ngSwitchCase="'login'">
        <h2>Bienvenido</h2>
        <form [formGroup]="loginForm" (ngSubmit)="login()">
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" formControlName="email" placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" formControlName="password" placeholder="••••••••">
          </div>
          <button type="submit" [disabled]="loginForm.invalid" class="primary-button">Ingresar</button>
        </form>
        <div class="auth-links">
          <a (click)="setMode('register')">¿No tienes cuenta? Registrate</a>
          <a (click)="setMode('forgot-password')">Olvidé mi contraseña</a>
        </div>
      </div>

      <!-- REGISTER -->
      <div *ngSwitchCase="'register'">
        <h2>Crear Cuenta</h2>
        <form [formGroup]="registerForm" (ngSubmit)="register()">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">Nombre</label>
              <input type="text" id="firstName" formControlName="firstName" placeholder="Nombre">
            </div>
            <div class="form-group">
              <label for="lastName">Apellido</label>
              <input type="text" id="lastName" formControlName="lastName" placeholder="Apellido">
            </div>
          </div>
          <div class="form-group">
            <label for="reg-email">Correo Electrónico</label>
            <input type="email" id="reg-email" formControlName="email" placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" formControlName="password" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirmar Contraseña</label>
            <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="••••••••">
          </div>
          <button type="submit" [disabled]="registerForm.invalid" class="primary-button">Registrarse</button>
        </form>
        <div class="auth-links">
          <a (click)="setMode('login')">¿Ya tienes cuenta? Ingresa</a>
        </div>
      </div>

      <!-- FORGOT PASSWORD -->
      <div *ngSwitchCase="'forgot-password'">
        <h2>Recuperar Contraseña</h2>
        <p>Ingresa tu correo para recibir un código de recuperación.</p>
        <form [formGroup]="forgotPasswordForm" (ngSubmit)="forgotPassword()">
          <div class="form-group">
            <label for="forgot-email">Correo Electrónico</label>
            <input type="email" id="forgot-email" formControlName="email" placeholder="tu@email.com">
          </div>
          <button type="submit" [disabled]="forgotPasswordForm.invalid" class="primary-button">Enviar Código</button>
        </form>
        <div class="auth-links">
          <a (click)="setMode('login')">Volver al ingreso</a>
        </div>
      </div>

      <!-- RESET PASSWORD -->
      <div *ngSwitchCase="'reset-password'">
        <h2>Nueva Contraseña</h2>
        <form [formGroup]="resetPasswordForm" (ngSubmit)="resetPassword()">
          <div class="form-group">
            <label for="reset-email">Correo Electrónico</label>
            <input type="email" id="reset-email" formControlName="email" placeholder="tu@email.com">
          </div>
          <div class="form-group">
            <label for="token">Código de recuperación</label>
            <input type="text" id="token" formControlName="token" placeholder="Código">
          </div>
          <div class="form-group">
            <label for="newPassword">Nueva Contraseña</label>
            <input type="password" id="newPassword" formControlName="newPassword" placeholder="••••••••">
          </div>
          <button type="submit" [disabled]="resetPasswordForm.invalid" class="primary-button">Restablecer</button>
        </form>
        <div class="auth-links">
          <a (click)="setMode('login')">Cancelar</a>
        </div>
      </div>
    </ng-container>
  </div>

  <div class="login-decor right">
    <img ngSrc="login_2.png" width="250" height="250" alt="" />
  </div>
</div>
