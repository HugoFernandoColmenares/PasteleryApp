<div class="login-wrapper">
  <div class="login-decor left">
    <img src="login_1.png" alt="Pastelería Decor" />
  </div>

  <div class="login-card">
    <h2>Bienvenido</h2>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" formControlName="email" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••">
      </div>
      <button type="submit" [disabled]="loginForm.invalid" class="primary-button">
        Ingresar
      </button>
    </form>
  </div>

  <div class="login-decor right">
    <img src="login_2.png" alt="Bakery Decor" />
  </div>
</div>
