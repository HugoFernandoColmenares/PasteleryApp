<div class="cart-container">
  <h2>Tu Carrito</h2>
  @if (cartItems().length === 0) {
  <p>Tu carrito está vacío.</p>
  } @else {
  <div class="cart-items">
    @for (item of cartItems(); track item.recipe.id) {
    <div class="cart-item">
      <div class="item-info">
        @if (item.recipe.imageUrl) {
          <img [src]="item.recipe.imageUrl" [alt]="item.recipe.name" />
        }
        <div>
          <h3>{{ item.recipe.name }}</h3>
          <p>{{ item.recipe.suggestedPrice | currency:'USD' }}</p>
        </div>
      </div>
      <div class="item-controls">
        <input type="number" [value]="item.quantity" (change)="updateQuantity(item.recipe.id, $event)" min="1" />
        <button (click)="removeFromCart(item.recipe.id)">Eliminar</button>
      </div>
    </div>
    }
  </div>
  <div class="cart-summary">
    <h3>Total: {{ totalPrice() | currency:'USD' }}</h3>
    <button class="secondary-button" (click)="clearCart()">Vaciar Carrito</button>
    <button class="primary-button" routerLink="/payment">Proceder al Pago</button>
  </div>
  }
</div>
