<div class="container">
  <div class="header">
    <h2>Ubicaciones de Almacenamiento</h2>
    <button class="btn-add" (click)="addLocation()">Nueva Ubicación</button>
  </div>

  <div *ngIf="loading()" class="loader">Cargando...</div>

  <div class="location-grid" *ngIf="!loading()">
    <div *ngFor="let loc of locations()" class="location-card">
      <div class="card-content">
        <h3>{{ loc.name }} <small>({{ loc.code }})</small></h3>
        <p>{{ loc.description }}</p>
      </div>
      <div class="card-actions">
        <button (click)="editLocation(loc)" class="btn-edit">Editar</button>
        <button (click)="deleteLocation(loc.id)" class="btn-delete">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- Form Modal -->
  <div class="modal" *ngIf="isFormVisible()">
    <div class="modal-content">
      <h3>{{ editingLocation() ? 'Editar Ubicación' : 'Nueva Ubicación' }}</h3>
      <form [formGroup]="locationForm" (ngSubmit)="saveLocation()">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="name" placeholder="Ej: Almacén Central">
        </div>
        <div class="form-group">
          <label>Código</label>
          <input type="text" formControlName="code" placeholder="Ej: ALM-01">
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea formControlName="description" placeholder="Descripción física..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" (click)="closeForm()" class="btn-secondary">Cancelar</button>
          <button type="submit" [disabled]="locationForm.invalid" class="btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>
