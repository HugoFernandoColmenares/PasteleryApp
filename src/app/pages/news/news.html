<div class="news-container">
    <header class="news-header">
        <h1>Foro de Novedades</h1>
        <p class="subtitle">Entérate de las últimas noticias, eventos y talleres de nuestra pastelería.</p>
    </header>

    <div class="news-grid">
        @for (item of news(); track item.id) {
        <article class="news-card">
            <div class="news-badge">{{ item.category }}</div>
            <span class="news-date">{{ item.date }}</span>
            <h3>{{ item.title }}</h3>
            <p>{{ item.summary }}</p>
            <div class="news-footer">
                <button class="read-more">Leer Más</button>
            </div>
        </article>
        }
    </div>
</div>
