<div class="form-container">
  <h2>{{ isEditMode() ? 'Editar Receta' : 'Nueva Receta' }}</h2>

  <form [formGroup]="recipeForm" (ngSubmit)="saveRecipe()">
    <div class="form-group">
      <label for="name">Nombre de la Receta</label>
      <input type="text" id="name" formControlName="name" placeholder="Ej: Pastel de Chocolate">
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea id="description" formControlName="description" placeholder="Breve descripción..."></textarea>
    </div>

    <div class="form-group">
      <label for="instructions">Instrucciones</label>
      <textarea id="instructions" formControlName="instructions" placeholder="Pasos a seguir..." rows="5"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="suggestedPrice">Precio Sugerido</label>
        <input type="number" id="suggestedPrice" formControlName="suggestedPrice" min="0">
      </div>
      <div class="form-group">
        <label>Imagen de la Receta</label>
        <div class="upload-container">
          <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" style="display: none;">
          <button type="button" class="btn-upload" (click)="fileInput.click()">
            <span class="icon">📷</span> {{ recipeForm.get('imageUrl')?.value ? 'Cambiar Imagen' : 'Subir Imagen' }}
          </button>
          <div class="image-preview" *ngIf="recipeForm.get('imageUrl')?.value">
            <img [src]="recipeForm.get('imageUrl')?.value" alt="Preview">
          </div>
        </div>
      </div>
    </div>

    <div class="ingredients-section">
      <h3>Ingredientes</h3>
      <div formArrayName="recipeIngredients">
        <div *ngFor="let ri of recipeIngredients.controls; let i = index" [formGroupName]="i" class="ingredient-row">
          <div class="form-group">
            <select formControlName="ingredientId">
              <option value="">Seleccionar ingrediente</option>
              <option *ngFor="let ing of ingredients()" [value]="ing.id">{{ ing.name }}</option>
            </select>
          </div>
          <div class="form-group">
            <input type="number" formControlName="amount" placeholder="Cantidad" min="0">
          </div>
          <div class="form-group">
            <input type="text" formControlName="unit" placeholder="Unidad (kg, g, etc)">
          </div>
          <button type="button" class="btn-remove" (click)="removeIngredient(i)">×</button>
        </div>
      </div>
      <button type="button" class="btn-add" (click)="addIngredient()">+ Añadir Ingrediente</button>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancel()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="recipeForm.invalid">Guardar Receta</button>
    </div>
  </form>
</div>
